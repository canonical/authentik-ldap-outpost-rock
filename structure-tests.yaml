schemaVersion: 2.0.0

fileExistenceTests:
  # ── Build tools must NOT be present ────────────────────────────────────────
  - name: "no go sdk"
    path: "/usr/local/go"
    shouldExist: false

  # ── Application binary ───────────────────────────────────────────────────────
  - name: "ldap outpost binary"
    path: "/ldap"
    shouldExist: true

  # ── System files ─────────────────────────────────────────────────────────────
  - name: "etc passwd"
    path: "/etc/passwd"
    shouldExist: true
  - name: "etc group"
    path: "/etc/group"
    shouldExist: true
  - name: "etc nsswitch.conf"
    path: "/etc/nsswitch.conf"
    shouldExist: true
  - name: "ca certificates bundle"
    path: "/etc/ssl/certs/ca-certificates.crt"
    shouldExist: true
  - name: "os-release"
    path: "/etc/os-release"
    shouldExist: true

commandTests:
  - name: "ldap outpost binary executes"
    command: "/ldap"
    args: ["--help"]
    exitCode: 0
